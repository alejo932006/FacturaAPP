# Conexión PostgreSQL (túnel Cloudflare local recomendado: db.host=127.0.0.1)
db.host=127.0.0.1
db.port=5433
db.name=FacturaAPP
db.user=postgres
db.password=0534

# Pool de conexiones (evita reconectar en cada consulta)
db.pool.min=1
db.pool.max=5
db.connect.timeout.ms=30000
db.idle.timeout.ms=600000
db.max.lifetime.ms=1800000
db.keepalive.ms=60000

# Timeouts del driver PostgreSQL (segundos)
db.pg.connect.timeout.seg=10
db.pg.socket.timeout.seg=60

# Parámetros extra JDBC
db.jdbc.params=tcpKeepAlive=true&prepareThreshold=1&ApplicationName=FacturaAPP
